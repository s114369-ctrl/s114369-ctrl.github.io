<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>還不讀書啊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .fc-event { cursor: pointer; border: none !important; padding: 4px 6px; border-radius: 6px; font-size: 0.8rem; font-weight: 500; user-select: none; }
        #calendar { background: white; padding: 16px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); height: 100%; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex flex-col">

    <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">📅 還不讀書啊</h1>
            <p class="text-xs text-slate-500">提示：日曆行程【單擊】看備註與勾選完成，【連按兩下】直接快速刪除！</p>
        </div>
        <button onclick="openModal('', 'todo')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-bold shadow transition transform active:scale-95 text-sm">
            ➕ 新增項目
        </button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm flex flex-col h-[calc(100vh-140px)]">
            <h2 class="text-lg font-bold text-slate-700 mb-3 flex items-center gap-2 border-b pb-2">
                ⏳ 未完成代辦事項
            </h2>
            <div id="todoSidebarList" class="space-y-3 overflow-y-auto flex-1 pr-1">
                </div>
        </div>

        <div class="lg:col-span-2">
            <div id="calendar"></div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <div id="modalTabs" class="flex border-b mb-4">
                <button id="tabTodo" onclick="switchTab('todo')" class="flex-1 py-2 font-bold text-sm text-center border-b-2 border-indigo-600 text-indigo-600">⚠️ 代辦事項</button>
                <button id="tabPlan" onclick="switchTab('plan')" class="flex-1 py-2 font-bold text-sm text-center text-slate-400 border-b-2 border-transparent">📝 預定行程</button>
            </div>
            
            <div id="modalBody" class="space-y-4"></div>
            
            <div class="mt-6 flex justify-end gap-3 border-t pt-4">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-400 hover:text-slate-600 text-sm font-medium">取消</button>
                <button id="saveBtn" class="px-5 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700 shadow-md">儲存項目</button>
            </div>
        </div>
    </div>

    <script>
        let events = JSON.parse(localStorage.getItem('study_v11')) || [];
        let calendar;
        let currentType = 'todo'; 
        let selectedDate = '';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: function(info, successCallback, failureCallback) {
                    const displayEvents = events.filter(e => {
                        if (e.extendedProps && e.extendedProps.type === 'todo' && e.extendedProps.isDone) return false;
                        return true;
                    });
                    successCallback(displayEvents);
                },
                displayEventTime: false,
                dateClick: (info) => openModal(info.dateStr, 'todo'), 
                
                // 核心改動：利用 eventDidMount 注入原生 click 與 dblclick 事件，徹底解決 FullCalendar 點擊失效問題
                eventDidMount: function(info) {
                    const eventEl = info.el;
                    const eventId = info.event.id;

                    // 單擊事件：點進去
                    eventEl.addEventListener('click', function(e) {
                        e.stopPropagation();
                        showEventDetail(eventId);
                    });

                    // 連按兩下（雙擊）事件：直接刪除
                    eventEl.addEventListener('dblclick', function(e) {
                        e.stopPropagation();
                        if(confirm("確定要直接刪除此項目嗎？")) {
                            deleteEvent(eventId);
                        }
                    });
                }
            });
            calendar.render();
            renderSidebar(); 
        });

        function openModal(dateStr = '', type = 'todo') {
            document.getElementById('modalTabs').classList.remove('hidden');
            const modal = document.getElementById('modal');
            const saveBtn = document.getElementById('saveBtn');
            modal.classList.remove('hidden');
            saveBtn.classList.remove('hidden');
            
            if (dateStr) selectedDate = dateStr;
            else selectedDate = new Date().toISOString().split('T')[0];

            switchTab(type);
        }

        function switchTab(type) {
            currentType = type;
            const tabTodo = document.getElementById('tabTodo');
            const tabPlan = document.getElementById('tabPlan');
            const body = document.getElementById('modalBody');

            if (type === 'todo') {
                tabTodo.className = "flex-1 py-2 font-bold text-sm text-center border-b-2 border-indigo-600 text-indigo-600";
                tabPlan.className = "flex-1 py-2 font-bold text-sm text-center text-slate-400 border-b-2 border-transparent";
            } else {
                tabPlan.className = "flex-1 py-2 font-bold text-sm text-center border-b-2 border-indigo-600 text-indigo-600";
                tabTodo.className = "flex-1 py-2 font-bold text-sm text-center text-slate-400 border-b-2 border-transparent";
            }

            body.innerHTML = `
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 space-y-2">
                    <label class="text-xs font-bold text-slate-600 block">時間設定 (選填)</label>
                    <input type="date" id="todoDate" value="${selectedDate}" class="w-full p-2 text-sm border rounded bg-white">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="flex items-center gap-1">
                            <input type="number" id="todoHour" min="0" max="23" placeholder="時 (0-23)" class="w-full p-2 text-sm border rounded bg-white">
                            <span class="text-xs text-slate-400">點</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="number" id="todoMin" min="0" max="59" placeholder="分 (預設00)" class="w-full p-2 text-sm border rounded bg-white">
                            <span class="text-xs text-slate-400">分</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 block">${type === 'todo' ? '⚠️ 代辦項目名稱 (必填)' : '📝 預定行程名稱 (必填)'}</label>
                    <input type="text" id="todoName" placeholder="${type === 'todo' ? '例如：期末微積分考試、交報告' : '例如：讀數學Ch1、去健身房'}" class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-indigo-500">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 block">備註說明 (選填)</label>
                    <textarea id="todoMemo" placeholder="補充說明..." class="w-full p-2 text-sm border rounded h-20"></textarea>
                </div>
            `;

            document.getElementById('saveBtn').onclick = () => saveItem(type);
        }

        function saveItem(type) {
            const name = document.getElementById('todoName').value;
            const date = document.getElementById('todoDate').value;
            let hour = document.getElementById('todoHour').value;
            let min = document.getElementById('todoMin').value;
            const memo = document.getElementById('todoMemo').value;

            if (!name) return alert("請輸入名稱！");

            let startStr = date || null;
            let timeLabel = "";

            if (date && hour !== "") {
                hour = String(hour).padStart(2, '0');
                min = min !== "" ? String(min).padStart(2, '0') : "00"; 
                startStr = `${date}T${hour}:${min}:00`;
                timeLabel = ` [${hour}:${min}]`;
            }

            const uniqueId = 'id-' + Date.now();
            const newEvent = {
                id: uniqueId,
                title: (type === 'todo' ? '⚠️ ' : '🗓️ ') + name + timeLabel,
                start: startStr || new Date().toISOString().split('T')[0], 
                allDay: (hour === ""),
                color: type === 'todo' ? '#6366f1' : '#0ea5e9', 
                extendedProps: {
                    type: type, 
                    originalName: name,
                    memo: memo || "無",
                    isDone: false,
                    rawDate: date || new Date().toISOString().split('T')[0],
                    hour: hour,
                    min: min
                }
            };

            events.push(newEvent);
            updateStorage();
            closeModal();
        }

        function renderSidebar() {
            const sidebar = document.getElementById('todoSidebarList');
            sidebar.innerHTML = "";

            const activeTodos = events.filter(e => e.extendedProps && e.extendedProps.type === 'todo' && !e.extendedProps.isDone);

            if (activeTodos.length === 0) {
                sidebar.innerHTML = `<p class="text-center text-sm text-slate-400 mt-10">🎉 目前沒有待辦項目</p>`;
                return;
            }

            const today = new Date().setHours(0,0,0,0);
            
            const sortedEvents = activeTodos.map(e => {
                const targetDate = new Date(e.extendedProps.rawDate).setHours(0,0,0,0);
                const diffTime = targetDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                let priority = 3; 
                if (diffDays < 0) priority = 4; 
                else if (diffDays <= 3) priority = 1; 
                else if (diffDays <= 7) priority = 2; 

                return { ...e, diffDays, priority };
            }).sort((a, b) => a.priority - b.priority || a.diffDays - b.diffDays);

            sortedEvents.forEach(e => {
                let badgeColor = "bg-slate-100 text-slate-600";
                let badgeText = "無期限";
                let pulseClass = "";

                if (e.diffDays < 0) {
                    badgeColor = "bg-slate-800 text-white";
                    badgeText = "已過期";
                } else if (e.diffDays <= 3) {
                    badgeColor = "bg-rose-100 text-rose-700 font-bold border border-rose-200";
                    badgeText = `🔥 剩 ${e.diffDays} 天`;
                    pulseClass = "animate-pulse";
                } else if (e.diffDays <= 7) {
                    badgeColor = "bg-amber-100 text-amber-700 font-bold";
                    badgeText = `⏳ 倒數 ${e.diffDays} 天`;
                } else {
                    badgeColor = "bg-blue-100 text-blue-700";
                    badgeText = `還有 ${e.diffDays} 天`;
                }

                const timeInfo = e.extendedProps.hour ? `${e.extendedProps.hour}:${e.extendedProps.min || '00'}` : "全天";

                const card = document.createElement('div');
                card.className = "p-3 bg-slate-50 rounded-xl border border-slate-100 hover:border-indigo-200 transition shadow-sm relative flex flex-col justify-between " + pulseClass;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-2 mb-2" onclick="showEventDetail('${e.id}')">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-sm text-slate-800 truncate">${e.extendedProps.originalName}</h3>
                            <p class="text-[11px] text-slate-400 mt-0.5">📅 ${e.extendedProps.rawDate} (${timeInfo})</p>
                            <p class="text-[11px] text-slate-500 mt-1 truncate italic">📝 備註: ${e.extendedProps.memo}</p>
                        </div>
                        <span class="text-[10px] px-2 py-0.5 rounded-full shrink-0 font-medium ${badgeColor}">${badgeText}</span>
                    </div>
                    <div class="flex justify-end gap-2 border-t pt-2 mt-1 relative z-10">
                        <button onclick="toggleDoneStatus('${e.id}'); event.stopPropagation();" class="text-[11px] bg-emerald-500 hover:bg-emerald-600 text-white px-2 py-1 rounded font-medium shadow-sm transition">
                            ✓ 完成
                        </button>
                        <button onclick="deleteEvent('${e.id}'); event.stopPropagation();" class="text-[11px] bg-slate-200 hover:bg-rose-500 hover:text-white text-slate-600 px-2 py-1 rounded font-medium transition">
                            🗑 刪除
                        </button>
                    </div>
                `;
                sidebar.appendChild(card);
            });
        }

        function showEventDetail(id) {
            const item = events.find(e => e.id === id);
            if (!item) return;

            const props = item.extendedProps;
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').innerText = "🔍 項目詳情";
            
            document.getElementById('modalTabs').classList.add('hidden');

            // 這裡實作你想要的：備註顯示、勾選完成的 Checkbox、以及刪除按鈕
            bodyContent = `
                <div class="bg-slate-50 p-4 rounded-xl space-y-4 border text-sm">
                    <div class="flex justify-between items-center">
                        <p class="text-base font-bold text-indigo-900">${props.originalName}</p>
                        <span class="px-2 py-0.5 text-xs rounded bg-slate-200 text-slate-700">${props.type === 'todo' ? '⚠️ 代辦事項' : '📝 預定行程'}</span>
                    </div>
                    <p class="text-slate-600"><strong>時間：</strong> ${props.rawDate} ${props.hour ? `[${props.hour}:${props.min || '00'}]` : '(全天)'}</p>
                    <p class="text-slate-700 bg-white p-2.5 rounded border border-slate-100 min-h-12"><strong>📝 備註說明：</strong><br><span class="text-slate-500 text-xs mt-1 block">${props.memo}</span></p>
                    
                    <div class="flex items-center gap-3 pt-2 border-t">
                        <input type="checkbox" id="detailCheckbox" ${props.isDone ? 'checked' : ''} onchange="toggleDoneStatus('${item.id}')" class="w-5 h-5 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer">
                        <label for="detailCheckbox" class="font-bold text-slate-700 cursor-pointer text-sm">標記為已完成</label>
                    </div>
                </div>
                <button onclick="deleteEvent('${item.id}'); closeModal();" class="w-full mt-4 bg-rose-500 hover:bg-rose-600 text-white py-2.5 rounded-lg font-bold transition shadow text-sm">🗑 刪除此項目</button>
            `;
            
            document.getElementById('modalBody').innerHTML = bodyContent;
            document.getElementById('saveBtn').classList.add('hidden');
            modal.classList.remove('hidden');
        }

        // 切換完成與未完成狀態（整合 Checkbox 與 列表按鈕）
        function toggleDoneStatus(id) {
            const idx = events.findIndex(e => e.id === id);
            if (idx > -1) {
                // 狀態反轉
                const currentStatus = events[idx].extendedProps.isDone;
                events[idx].extendedProps.isDone = !currentStatus;
                
                if (events[idx].extendedProps.type === 'plan') {
                    if (events[idx].extendedProps.isDone) {
                        events[idx].color = '#10b981'; // 變綠色
                        events[idx].title = '✅ ' + events[idx].extendedProps.originalName + (events[idx].extendedProps.hour ? ` [${events[idx].extendedProps.hour}:${events[idx].extendedProps.min}]` : '');
                    } else {
                        events[idx].color = '#0ea5e9'; // 變回藍色
                        events[idx].title = '🗓️ ' + events[idx].extendedProps.originalName + (events[idx].extendedProps.hour ? ` [${events[idx].extendedProps.hour}:${events[idx].extendedProps.min}]` : '');
                    }
                }
            }
            updateStorage();
            closeModal();
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            updateStorage();
        }

        function updateStorage() {
            localStorage.setItem('study_v11', JSON.stringify(events));
            calendar.refetchEvents(); 
            renderSidebar(); 
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
