<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動月曆讀書計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .fc-event { cursor: pointer; }
        #calendar { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-700">📅 智能進度月曆</h1>
            <button onclick="openModal('exam')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg shadow transition">新增考試</button>
        </header>

        <div id="calendar"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl">
            <h2 id="modalTitle" class="text-xl font-bold mb-4">標題</h2>
            <div id="modalBody" class="space-y-4">
                </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded">取消</button>
                <button id="saveBtn" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">儲存</button>
            </div>
        </div>
    </div>

    <script>
        let events = JSON.parse(localStorage.getItem('study_events')) || [];
        let calendar;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: events,
                // 點擊空白日期：新增讀書計畫
                dateClick: function(info) {
                    openModal('plan', info.dateStr);
                },
                // 點擊現有事件：查看詳情或標記完成
                eventClick: function(info) {
                    showEventDetail(info.event);
                }
            });
            calendar.render();
        });

        function openModal(type, dateStr = '') {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            const saveBtn = document.getElementById('saveBtn');
            modal.classList.remove('hidden');

            if (type === 'exam') {
                title.innerText = "新增考試科目";
                body.innerHTML = `
                    <input type="text" id="name" placeholder="科目名稱 (如: 數學)" class="w-full p-2 border rounded">
                    <input type="date" id="date" class="w-full p-2 border rounded">
                    <textarea id="range" placeholder="考試範圍" class="w-full p-2 border rounded"></textarea>
                `;
                saveBtn.onclick = () => saveEvent('exam');
            } else if (type === 'plan') {
                title.innerText = `${dateStr} 讀書計畫`;
                body.innerHTML = `
                    <input type="text" id="name" placeholder="預定讀什麼？(如: 複習數學Ch1)" class="w-full p-2 border rounded">
                    <input type="number" id="hours" placeholder="預定時數" class="w-full p-2 border rounded">
                    <input type="hidden" id="date" value="${dateStr}">
                    <p class="text-xs text-gray-400">提示：如果名稱包含科目，完成後對應考試會變綠色</p>
                `;
                saveBtn.onclick = () => saveEvent('plan');
            }
        }

        function saveEvent(type) {
            const name = document.getElementById('name').value;
            const date = document.getElementById('date').value;
            const rangeOrHours = document.getElementById('range')?.value || document.getElementById('hours')?.value;

            if (!name || !date) return alert("請填寫必填欄位");

            const newEvent = {
                id: 'id-' + Date.now(),
                title: (type === 'exam' ? '🚫 ' : '📖 ') + name,
                start: date,
                extendedProps: {
                    type: type,
                    range: rangeOrHours,
                    originalName: name,
                    isDone: false
                },
                color: type === 'exam' ? '#ef4444' : '#3b82f6' // 考試紅色，計畫藍色
            };

            events.push(newEvent);
            updateStorage();
            closeModal();
        }

        function showEventDetail(event) {
            const props = event.extendedProps;
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').innerText = event.title;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>類型：</strong>${props.type === 'exam' ? '考試' : '讀書計畫'}</p>
                <p><strong>內容：</strong>${props.range}</p>
                <p><strong>狀態：</strong>${props.isDone ? '✅ 已完成' : '❌ 未完成'}</p>
                ${!props.isDone ? `<button onclick="markAsDone('${event.id}')" class="w-full mt-4 bg-green-500 text-white py-2 rounded">標記為已讀完</button>` : ''}
                <button onclick="deleteEvent('${event.id}')" class="w-full mt-2 bg-gray-200 text-gray-700 py-2 rounded">刪除</button>
            `;
            document.getElementById('saveBtn').classList.add('hidden');
            modal.classList.remove('hidden');
        }

        function markAsDone(id) {
            const eventIndex = events.findIndex(e => e.id === id);
            if (eventIndex > -1) {
                events[eventIndex].extendedProps.isDone = true;
                events[eventIndex].color = '#10b981'; // 變成綠色
                
                // 聯動邏輯：如果讀的是某科目，把該科目的「考試」也變綠色
                const subject = events[eventIndex].extendedProps.originalName;
                events.forEach(e => {
                    if (e.extendedProps.type === 'exam' && e.extendedProps.originalName.includes(subject)) {
                        e.extendedProps.isDone = true;
                        e.color = '#10b981';
                    }
                });
            }
            updateStorage();
            closeModal();
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            updateStorage();
            closeModal();
        }

        function updateStorage() {
            localStorage.setItem('study_events', JSON.stringify(events));
            calendar.removeAllEvents();
            calendar.addEventSource(events);
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('saveBtn').classList.remove('hidden');
        }
    </script>
</body>
</html>
